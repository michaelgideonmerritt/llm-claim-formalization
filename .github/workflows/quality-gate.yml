name: Quality Gate

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[demo,dev]"

      - name: Unit and Integration Tests
        run: pytest

      - name: Lint
        run: ruff check src tests --no-cache

      - name: Type Check
        run: mypy src --cache-dir /tmp/mypy-llm-claim-formalization

      - name: Benchmark Regression Gate
        run: llm-cf-eval --llm-mode mock --enforce-thresholds

      - name: User Suite Smoke
        run: llm-cf-user-eval --llm-mode mock --iterations 1 --show-failures 10
