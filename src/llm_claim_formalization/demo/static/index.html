<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Claim Formalization - Demo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header role="banner">
            <h1>LLM Claim Formalization</h1>
            <p class="subtitle">Hybrid symbolic-neural verification for natural language claims</p>
        </header>

        <main role="main">
            <div class="input-section">
                <label for="claim-input">Enter a claim to verify:</label>
                <textarea
                    id="claim-input"
                    rows="3"
                    placeholder="If a product costs $100 and I apply a 50% discount followed by another 20% discount, the final price is $40"
                    aria-label="Claim input"
                    aria-describedby="claim-instructions"></textarea>
                <span id="claim-instructions" class="visually-hidden">Enter a mathematical claim in natural language to verify its correctness</span>
                <button id="verify-btn" onclick="verifyClaim()" aria-label="Verify claim">Verify</button>
            </div>

            <div id="result" class="result hidden" role="status" aria-live="polite" aria-atomic="true"></div>

            <div class="examples">
                <h3>Example Claims</h3>
                <div class="example-grid" role="group" aria-label="Example claims">
                    <button class="example-btn" onclick="setExample('If a product costs $100 and I apply a 50% discount followed by another 20% discount, the final price is $40')" aria-label="Try example: Compound discounts">
                        Compound discounts
                    </button>
                    <button class="example-btn" onclick="setExample('If I invest $1000 at 10% annual interest compounded monthly for 2 years, I will have exactly $1220 at the end')" aria-label="Try example: Compound interest">
                        Compound interest
                    </button>
                    <button class="example-btn" onclick="setExample('A car depreciates 15% per year, so after 3 years a $30,000 car is worth $16,500')" aria-label="Try example: Depreciation">
                        Depreciation
                    </button>
                    <button class="example-btn" onclick="setExample('If I save $100 per month for 10 years at 5% annual interest, I will have saved $12,000 total')" aria-label="Try example: Savings calculation">
                        Savings calculation
                    </button>
                    <button class="example-btn" onclick="setExample('A store has a 20% off sale, then takes an additional 30% off the sale price, which equals 50% off the original price')" aria-label="Try example: Stacked discounts">
                        Stacked discounts
                    </button>
                    <button class="example-btn" onclick="setExample('If I buy 3 items at $19.99 each and pay with a $100 bill, I will get back $40.03 in change')" aria-label="Try example: Change calculation">
                        Change calculation
                    </button>
                    <button class="example-btn" onclick="setExample('A 15% tip on a $47.82 bill is $7.00')" aria-label="Try example: Tip calculation">
                        Tip calculation
                    </button>
                    <button class="example-btn" onclick="setExample('If gas costs $3.45 per gallon and I need to drive 285 miles in a car that gets 32 mpg, I will spend less than $30 on gas')" aria-label="Try example: Trip cost">
                        Trip cost
                    </button>
                </div>
            </div>
        </main>

        <footer role="contentinfo">
            <p>
                <a href="https://github.com/michaelgideonmerritt/llm-claim-formalization" target="_blank" rel="noopener noreferrer">GitHub</a> •
                MIT License •
                Runs locally with LFM 2.5
            </p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
