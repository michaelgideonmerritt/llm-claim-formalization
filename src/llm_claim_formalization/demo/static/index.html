<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Claim Formalization - Demo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header role="banner">
            <h1>LLM Claim Formalization</h1>
            <p class="subtitle">Hybrid symbolic-neural verification for natural language claims</p>
        </header>

        <main role="main">
            <div class="input-section">
                <label for="claim-input">Enter a claim to verify:</label>
                <textarea
                    id="claim-input"
                    rows="3"
                    placeholder="If a product costs $100 and I apply a 50% discount followed by another 20% discount, the final price is $40"
                    aria-label="Claim input"
                    aria-describedby="claim-instructions"></textarea>
                <span id="claim-instructions" class="visually-hidden">Enter a mathematical claim in natural language to verify its correctness</span>
                <button id="verify-btn" onclick="verifyClaim()" aria-label="Verify claim">Verify</button>
            </div>

            <div id="result" class="result hidden" role="status" aria-live="polite" aria-atomic="true"></div>

            <div class="examples">
                <h3>Example Claims</h3>
                <div class="example-grid" role="group" aria-label="Example claims">
                    <button class="example-btn" onclick="setExample('If a product costs $100 and I apply a 50% discount followed by another 20% discount, the final price is $40')" aria-label="Try example: Compound discounts">
                        Compound discounts
                    </button>
                    <button class="example-btn" onclick="setExample('A price that increases by 25% then decreases by 25% returns to the original price')" aria-label="Try example: Percentage paradox">
                        Percentage paradox
                    </button>
                    <button class="example-btn" onclick="setExample('If I drive 120 miles and my car gets 25 miles per gallon, I will use less than 4 gallons of gas')" aria-label="Try example: Rate calculation">
                        Rate calculation
                    </button>
                    <button class="example-btn" onclick="setExample('A store offers 30% off everything, so buying a $50 item saves me $30')" aria-label="Try example: Common mistake">
                        Common mistake
                    </button>
                </div>
            </div>
        </main>

        <footer role="contentinfo">
            <p>
                <a href="https://github.com/michaelgideonmerritt/llm-claim-formalization" target="_blank" rel="noopener noreferrer">GitHub</a> •
                MIT License •
                Runs locally with LFM 2.5
            </p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
